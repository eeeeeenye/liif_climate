train_dataset:
  dataset:
    name: paired-image-folders
    args: 
      root_path_1: ./load/gpp/gpp_01deg_input_x5
      root_path_2: ./load/gpp/gpp_001deg_output
      topo_nc_path: /home/share/KCP/2026/INR/_nc/elev_SRTM_v11_001deg.nc
      cache: in_memory
  wrapper:
    name: sr-implicit-paired
    args:
      sample_q: 1024
      augment: false
  batch_size: 16

val_dataset:
  dataset:
    name: paired-image-folders
    args:
      root_path_1: ./load/gpp/gpp_01deg_input_val_x5
      root_path_2: ./load/gpp/gpp_001deg_output_val
      topo_nc_path: /home/share/KCP/2026/INR/_nc/elev_SRTM_v11_001deg.nc
      cache: in_memory
  wrapper: 
    name: sr-implicit-paired
    args: 
      sample_q: 1024
      augment: false
  batch_size: 16

data_norm:
  inp: {sub: [0.5], div: [0.5]}
  gt: {sub: [0.5], div: [0.5]}

model:
  name: liif
  args:
    encoder_spec:
      name: edsr
      args:
        no_upsampling: true
    imnet_spec:
      name: mlp
      args:
        out_dim: 1
        hidden_list: [256, 256, 256, 256]
    extra_in_dim: 1

optimizer:
  name: adam
  args: 
    lr: 1.e-4
epoch_max: 1000
multi_step_lr: 
  milestones: [200, 400, 600, 800]
  gamma: 0.5
epoch_val: 1
epoch_save: 100
