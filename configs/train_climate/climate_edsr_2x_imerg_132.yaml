train_dataset:
  dataset:
    name: paired-image-folders
    args: 
      root_path_1: ./load/climate/climate_train_korea_imerg100_132
      root_path_2: ./load/climate/climate_train_korea_imerg200_132
      # repeat: 20
      cache: in_memory
  wrapper:
    name: sr-implicit-paired
    args:
      sample_q: 1024
      augment: flase
  batch_size: 16

val_dataset:
  dataset:
    name: paired-image-folders
    args:
      root_path_1: ./load/climate/climate_val_korea_imerg100_132
      root_path_2: ./load/climate/climate_val_korea_imerg200_132
      first_k: 10
      repeat: 160
      cache: in_memory
  wrapper:
    name: sr-implicit-paired
    args: 
      sample_q: 1024
      augment: False
  batch_size: 16

data_norm:
  inp: {sub: [0.5], div: [0.5]}
  gt: {sub: [0.5], div: [0.5]}

model:
  name: liif
  args:
    encoder_spec:
      name: edsr
      args:
        no_upsampling: true
    imnet_spec:
      name: mlp
      args:
        out_dim: 3
        hidden_list: [256, 256, 256, 256]

optimizer:
  name: adam
  args: 
    lr: 1.e-4
epoch_max: 1000
# resume: /home/inhye_yoo/inr/liif/save/_climate/epoch-last.pth
multi_step_lr: 
  milestones: [200, 400, 600, 800]
  gamma: 0.5

epoch_val: 1
epoch_save: 100
