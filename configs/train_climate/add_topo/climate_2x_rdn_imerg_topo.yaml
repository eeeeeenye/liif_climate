train_dataset:
  dataset:
    name: paired-image-folders
    args:
      root_path_1: ./load/climate/climate_train_korea_imerg100
      root_path_2: ./load/climate/climate_train_korea_imerg200
      topo_nc_path: ./data/ETOPO1_on_IMERG_Land.nc
      cache: in_memory
  wrapper:
    name: sr-implicit-paired
    args:
      sample_q: 1024
  batch_size: 16
val_dataset:
  dataset:
    name: paired-image-folders
    args:
      root_path_1: ./load/climate/climate_val_korea_imerg100
      root_path_2: ./load/climate/climate_val_korea_imerg200
      topo_nc_path: ./data/ETOPO1_on_IMERG_Land.nc
      first_k: 10
      repeat: 160
      cache: in_memory
  wrapper:
    name: sr-implicit-paired
    args:
      sample_q: 1024
      augment: false
  batch_size: 16
data_norm:
  inp:
    sub:
    - 0.5
    div:
    - 0.5
  gt:
    sub:
    - 0.5
    div:
    - 0.5
model:
  name: liif
  args:
    encoder_spec:
      name: rdn
      args:
        no_upsampling: true
    imnet_spec:
      name: mlp
      args:
        out_dim: 3
        hidden_list:
        - 256
        - 256
        - 256
        - 256
    extra_in_dim: 1
optimizer:
  name: adam
  args:
    lr: 0.0001
epoch_max: 1000
multi_step_lr:
  milestones:
  - 200
  - 400
  - 600
  - 800
  gamma: 0.5
epoch_val: 1
epoch_save: 100
