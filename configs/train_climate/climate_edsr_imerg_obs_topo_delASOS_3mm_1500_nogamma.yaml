train_dataset:
  dataset:
    name: paired-image-folders
    args:
      root_path_1: ./load/climate/climate_train_korea_imerg50_test
      root_path_2: ./load/climate/climate_train_korea_imerg100_test
      topo_nc_path: ./data/ETOPO1_on_IMERG_Land.nc
      obs_path_3: ./data/preprocessed_obs_daily_precip_1998_2009_final_rm_diff_ge3.0mm.csv
      meta_path: ./load/climate/meta/climate_train_korea_imerg100.json
      cache: in_memory
  wrapper:
    name: sr-implicit-paired
    args:
      finetune: true
      sample_q: 1024
      augment: false
  batch_size: 16
val_dataset:
  dataset:
    name: paired-image-folders
    args:
      root_path_1: ./load/climate/climate_val_korea_imerg50_test
      root_path_2: ./load/climate/climate_val_korea_imerg100_test
      topo_nc_path: ./data/ETOPO1_on_IMERG_Land.nc
      obs_path_3: ./data/preprocessed_obs_daily_precip_2010_2019_final_rm_diff_ge3.0mm.csv
      meta_path: ./load/climate/meta/climate_val_korea_imerg100.json
      first_k: 1096
      # repeat: 160
      cache: in_memory
  wrapper:
    name: sr-implicit-paired
    args:
      sample_q: 1024
      augment: false
      finetune: true
  batch_size: 16
data_norm:
  inp:
    sub:
    - 0.5
    div:
    - 0.5
  gt:
    sub:
    - 0.5
    div:
    - 0.5
model:
  name: liif
  args:
    encoder_spec:
      name: edsr
      args:
        no_upsampling: true
    imnet_spec:
      name: mlp
      args:
        out_dim: 1
        hidden_list:
        - 256
        - 256
        - 256
        - 256
    extra_in_dim: 1
optimizer:
  name: adam
  args:
    lr: 1.e-4
epoch_max: 1200
resume: ./save/_climate_edsr_imerg_obs_topo_delASOS/epoch-last.pth
epoch_val: 1
epoch_save: 1
