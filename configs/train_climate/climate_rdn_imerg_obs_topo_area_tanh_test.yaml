train_dataset:
  dataset:
    name: paired-image-folders
    args: 
      root_path_1: ./load/climate/climate_train_korea_imerg50_1998_2019
      root_path_2: ./load/climate/climate_train_korea_imerg100_1998_2019
      topo_nc_path: ./data/ETOPO1_on_IMERG_Land.nc
      obs_path_3: ./data/preprocessed_1998_2019.csv
      meta_path: ./load/climate/meta/train_imerg100_meta_1998_2019.json
      cache: in_memory
  wrapper:
    name: sr-implicit-paired
    args:
      finetune: True
      sample_q: 1024
      augment: False
  batch_size: 16

val_dataset:
  dataset:
    name: paired-image-folders
    args:
      root_path_1: ./load/climate/climate_val_korea_imerg50_2020_2022
      root_path_2: ./load/climate/climate_val_korea_imerg100_2020_2022
      topo_nc_path: ./data/ETOPO1_on_IMERG_Land.nc
      obs_path_3: ./data/preprocessed_obs_2020_2022.csv
      meta_path: ./load/climate/meta/val_imerg100_meta_2020_2022.json
      cache: in_memory
  wrapper:
    name: sr-implicit-paired
    args: 
      sample_q: 1024
      augment: False
      finetune: True
  batch_size: 16

data_norm:
  inp: {sub: [0.5], div: [0.5]}
  gt: {sub: [0.5], div: [0.5]}

model:
  name: liif
  args:
    encoder_spec:
      name: edsr
      args:
        no_upsampling: true
        # freeze: true
    imnet_spec:
      name: mlp
      args:
        out_dim: 1
        hidden_list: [256, 256, 256, 256]
    extra_in_dim: 2

optimizer:
  name: adam
  args: 
    lr: 1.e-4
# resume: ./save/_climate_2x_rdn/epoch-last.pth
epoch_max: 1000
multi_step_lr: 
  milestones: [200, 400, 600, 800]
  gamma: 0.5

epoch_val: 1
epoch_save: 100
